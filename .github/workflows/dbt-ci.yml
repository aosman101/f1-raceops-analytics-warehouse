name: dbt-ci

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  dbt:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: f1_raceops
          POSTGRES_USER: f1
          POSTGRES_PASSWORD: f1_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U f1 -d f1_raceops"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: f1_raceops
      PGUSER: f1
      PGPASSWORD: f1_password

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          python -m pip install dbt-core dbt-postgres

      - name: dbt deps
        run: |
          cd dbt
          dbt deps --profiles-dir .

      - name: Create warehouse schemas
        run: |
          psql "postgres://f1:f1_password@localhost:5432/f1_raceops" -f sql/init/00_create_schemas.sql

      - name: dbt parse (validates models, sources, tests, macros)
        run: |
          cd dbt
          dbt parse --profiles-dir .

      - name: dbt compile (no raw data in CI)
        run: |
          cd dbt
          dbt compile --profiles-dir .
f1_raceops:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('PGHOST', 'localhost') }}"
      user: "{{ env_var('PGUSER', 'f1') }}"
      password: "{{ env_var('PGPASSWORD', 'f1_password') }}"
      port: "{{ env_var('PGPORT', '5432') | int }}"
      dbname: "{{ env_var('PGDATABASE', 'f1_raceops') }}"
      schema: analytics
      threads: 4